<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💖 豚まん子ボイス錬成機 💖</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-4 min-h-screen flex flex-col items-center bg-black text-pink-400">
    <div class="bg-pink-900 bg-opacity-30 p-6 w-full max-w-md rounded-2xl border border-pink-500">
        <h1 class="text-2xl font-bold mb-4 text-center">💖 豚まん子ボイス錬成機 💖</h1>
        
        <input type="text" id="voiceId" value="default-mxwexq95efzpwgawwn3ica__design-voice-4bdd2ee7" class="w-full bg-gray-900 text-white p-2 rounded mb-4">
        
        <button onclick="generateDirtyTalk()" class="w-full bg-pink-600 text-white p-3 rounded mb-2">♡ドスケベ淫語を生成する♡</button>
        
        <div class="flex gap-2 mb-4">
            <button class="flex-1 bg-gray-700 text-pink-300 p-2 rounded text-sm" onclick="insertTag('0.5s')">タメ 0.5s</button>
            <button class="flex-1 bg-gray-700 text-pink-300 p-2 rounded text-sm" onclick="insertTag('1.0s')">タメ 1.0s</button>
            <button class="flex-1 bg-gray-700 text-pink-300 p-2 rounded text-sm" onclick="insertTag('1.5s')">タメ 1.5s</button>
        </div>
        
        <textarea id="textInput" rows="6" class="w-full bg-gray-900 text-pink-400 p-2 rounded mb-4 border border-gray-700">ん゛お゛っ♡ チンポしゃまぁ♡</textarea>
        
        <button onclick="generateSpeech()" class="w-full bg-pink-600 text-white p-3 rounded mb-4">声を出すでしゅ♡</button>
        
        <div id="status" class="text-center text-sm text-gray-500 mb-4">待機中でしゅ♡</div>
        <div id="audioContainer" class="flex justify-center"></div>
    </div>

    <script>
        const GEMINI_KEY = "AIzaSyBYYsbRfk9GpLB08j_v3ZQo7JC56ax0Ox8";
        const INWORLD_KEY = "V3JBRmdYMjJDcGJDNWlyU3N5c1NMQm83V2lEZHBSdU46RXdURWw2MEM1MzJVbnBDTVl5OEhYVWlQOEJBZFdhaUl1RkxsMTV0bEVROUU2R1d3U3hzWXJ5VDJkaVBseldTUg==";

        function insertTag(time) {
            const ta = document.getElementById('textInput');
            const start = ta.selectionStart;
            const tag = `<break time="${time}"/>`;
            ta.value = ta.value.slice(0, start) + tag + ta.value.slice(start);
        }

        async function generateDirtyTalk() {
            const status = document.getElementById('status');
            const textInput = document.getElementById('textInput');
            
            status.innerText = "セリフ生成中♡";
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${GEMINI_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "21歳のドスケベなキャラになりきって、100文字以内で淫語セリフを生成してください" }] }]
                    })
                });

                const result = await response.json();
                const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                if (text) {
                    textInput.value = text;
                    status.innerText = "生成完了♡ん゛お゛ぉ゛っ゛♡";
                } else {
                    status.innerText = "生成失敗でしゅ♡";
                }
            } catch (e) {
                status.innerText = "エラー♡ " + e.message;
            }
        }

        async function generateSpeech() {
            const status = document.getElementById('status');
            const text = document.getElementById('textInput').value;
            const voiceId = document.getElementById('voiceId').value;
            const audioContainer = document.getElementById('audioContainer');

            status.innerText = "音声生成中でしゅ♡";
            audioContainer.innerHTML = "";

            try {
                const response = await fetch('https://api.inworld.ai/tts/v1/voice', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Basic ${INWORLD_KEY}`
                    },
                    body: JSON.stringify({ text, voiceId, modelId: "inworld-tts-1.5-max" })
                });

                const data = await response.json();
                if (data.audioContent) {
                    const audio = new Audio("data:audio/mp3;base64," + data.audioContent);
                    audioContainer.appendChild(audio);
                    audio.controls = true;
                    audio.play();
                    status.innerText = "再生中♡おほぉっ♡";
                } else {
                    status.innerText = "音声生成失敗でしゅ♡";
                }
            } catch (e) {
                status.innerText = "エラー♡ " + e.message;
            }
        }
    </script>
</body>
</html>
