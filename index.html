<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💖 豚まん子ボイス錬成機 💖</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-4 min-h-screen flex flex-col items-center bg-black text-pink-400">

    <div class="bg-pink-900 bg-opacity-30 p-6 w-full max-w-md rounded-2xl border border-pink-500 shadow-[0_0_20px_rgba(236,72,153,0.3)]">
        <h1 class="text-2xl font-bold mb-4 text-center">💖 豚まん子ボイス錬成機 💖</h1>
        
        <!-- API Keys -->
        <div class="mb-4">
            <label class="block text-xs mb-1 opacity-70 text-white">Inworld API Key (Basic)</label>
            <input type="password" id="apiKey" placeholder="Inworldのキーを注入して♡" oninput="saveKey('inworld_api_key', this.value)" class="w-full bg-gray-900 text-white p-2 rounded mb-2 border border-pink-900 focus:border-pink-500 outline-none">
            
            <label class="block text-xs mb-1 opacity-70 text-white">Gemini API Key</label>
            <input type="password" id="geminiKey" placeholder="Geminiのキーを注入して♡" oninput="saveKey('gemini_api_key', this.value)" class="w-full bg-gray-900 text-white p-2 rounded mb-2 border border-pink-900 focus:border-pink-500 outline-none">
            
            <label class="block text-xs mb-1 opacity-70 text-white">Voice ID</label>
            <input type="text" id="voiceId" value="default-mxwexq95efzpwgawwn3ica__design-voice-4bdd2ee7" class="w-full bg-gray-900 text-white p-2 rounded border border-pink-900 focus:border-pink-500 outline-none">
        </div>
        
        <!-- セリフ生成 -->
        <button id="genBtn" onclick="generateDirtyTalk()" class="w-full bg-pink-600 hover:bg-pink-500 text-white font-bold p-3 rounded-xl mb-4 transition-all shadow-lg active:scale-95">
            ♡ドスケベ淫語を生成する♡
        </button>
        
        <!-- タメ注入 -->
        <div class="flex gap-2 mb-4">
            <button class="flex-1 bg-gray-700 text-pink-300 p-2 rounded-lg text-sm border border-pink-900 hover:bg-gray-600" onclick="insertTag('0.5s')">タメ 0.5s</button>
            <button class="flex-1 bg-gray-700 text-pink-300 p-2 rounded-lg text-sm border border-pink-900 hover:bg-gray-600" onclick="insertTag('1.0s')">タメ 1.0s</button>
            <button class="flex-1 bg-gray-700 text-pink-300 p-2 rounded-lg text-sm border border-pink-900 hover:bg-gray-600" onclick="insertTag('1.5s')">タメ 1.5s</button>
        </div>
        
        <!-- テキスト入力 -->
        <label class="block text-xs mb-1 opacity-70 text-white">表示用セリフ (♡あり、異常濁点あり♡)</label>
        <textarea id="textInput" rows="3" oninput="debouncedSync()" class="w-full bg-gray-900 text-pink-400 p-2 rounded-xl mb-2 border border-pink-900 focus:border-pink-500 outline-none">ん゛ぉ゛っ゛♡ チンポしゃまぁ♡ まん子の脳みそトロトロでしゅ♡ あへぇ♡</textarea>

        <label class="block text-xs mb-1 opacity-70 text-white">読み上げ用内部テキスト (♡排除、装飾・絵文字は「。」変換♡)</label>
        <textarea id="readingInput" rows="3" class="w-full bg-gray-800 text-gray-400 p-2 rounded-xl mb-4 border border-gray-700 outline-none text-sm" placeholder="ここが読み上げに使われましゅ♡">んぉっ。 チンポしゃま。 まんこののうみそとろとろでしゅ。 あへぇ。</textarea>
        
        <!-- 音声生成ボタン -->
        <button onclick="generateSpeech()" class="w-full bg-pink-600 hover:bg-pink-500 text-white font-bold p-4 rounded-2xl mb-4 transition-all shadow-lg active:scale-95">
            声を出すでしゅ♡
        </button>
        
        <!-- ステータス表示 -->
        <div id="status" class="text-center text-xs text-gray-500 mb-4 h-4 italic">待機中でしゅ♡</div>
        
        <!-- 再生表示 -->
        <div id="audioContainer" class="flex justify-center">
            <audio id="mainAudio" controls class="w-full opacity-80"></audio>
        </div>

        <!-- 忘却ボタン -->
        <button onclick="clearKeys()" class="w-full mt-4 text-[10px] text-gray-700 hover:text-pink-900">※全てのキーを忘却させる</button>
    </div>

    <script>
        const DEFAULT_GEMINI = "AIzaSyBYYsbRfk9GpLB08j_v3ZQo7JC56ax0Ox8";
        const DEFAULT_INWORLD = "V3JBRmdYMjJDcGJDNWlyU3N5c1NMQm83V2lEZHBSdU46RXdURWw2MEM1MzJVbnBDTVl5OEhYVWlQOEJBZFdhaUl1RkxsMTV0bEVROUU2R1d3U3hzWXJ5VDJkaVBseldTUg==";
        let syncTimeout;

        window.onload = () => {
            loadKey('apiKey', 'inworld_api_key', DEFAULT_INWORLD);
            loadKey('geminiKey', 'gemini_api_key', DEFAULT_GEMINI);
        };

        function saveKey(storageKey, val) {
            localStorage.setItem(storageKey, val);
        }

        function loadKey(elementId, storageKey, defaultVal) {
            const saved = localStorage.getItem(storageKey);
            document.getElementById(elementId).value = saved || defaultVal;
            if (!saved) localStorage.setItem(storageKey, defaultVal);
        }

        function clearKeys() {
            localStorage.clear();
            document.getElementById('apiKey').value = "";
            document.getElementById('geminiKey').value = "";
            document.getElementById('status').innerText = "全部忘れまちたぁ♡";
        }

        async function callGeminiInternal(prompt, system, isJson = false) {
            const apiKey = ""; // API Key injection point
            if (!apiKey) return null;
            const model = "gemini-2.5-flash-preview-09-2025";
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
            
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: system }] }
            };

            if (isJson) {
                payload.generationConfig = {
                    responseMimeType: "application/json",
                    responseSchema: {
                        type: "OBJECT",
                        properties: {
                            display: { type: "STRING" },
                            reading: { type: "STRING" }
                        }
                    }
                };
            }

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                return result.candidates?.[0]?.content?.parts?.[0]?.text;
            } catch (e) {
                return null;
            }
        }

        function debouncedSync() {
            clearTimeout(syncTimeout);
            syncTimeout = setTimeout(syncReading, 500);
        }

        async function syncReading() {
            const display = document.getElementById('textInput').value;
            const reading = document.getElementById('readingInput');
            const status = document.getElementById('status');
            let geminiKey = document.getElementById('geminiKey').value;

            if (!display) return;
            
            // リアルタイム簡易処理
            let instantProcessed = display
                .replace(/([あ-んア-ン])゛/g, "$1") 
                .replace(/[♡❤️💕✨💖♪☆★]|[^\u3041-\u3096\u30A1-\u30FA\u4E00-\u9FFFa-zA-Z0-9、。！!？?…¥%&()#\s]/g, "。");
            
            reading.value = instantProcessed;
            status.innerText = "同期中でしゅ♡";

            const kanjiToKanaPrompt = `以下の文章をTTS用に変換して。
【表示用テキスト】
${display}

【変換ルール】
1. 漢字は全て「ひらがな」に。固有名詞は「カタカナ」。
2. 「♡」「♪」「☆」「★」や絵文字、その他装飾記号は全て読み上げから排除し「。」に置換。
3. 「、」「。」「！」「？」「…」以外の文字化けしそうな特殊記号も「。」に置換。
4. ただし自然会話で使う「¥%&()#」等は維持。
5. 表示用にある「♡」を読み上げないよう排除しつつ、文章として不自然な場所（読みづらい連続文字等）にのみ、自然なテンポのための「、」や「。」を最小限で補完。多用厳禁。
6. 出力は変換後の読み上げ用テキストのみ。`;

            try {
                let resultText = null;
                if (geminiKey) {
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${geminiKey}`;
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: display }] }],
                            systemInstruction: { parts: [{ text: kanjiToKanaPrompt }] }
                        })
                    });
                    const res = await response.json();
                    resultText = res.candidates?.[0]?.content?.parts?.[0]?.text;
                }

                if (!resultText) {
                    resultText = await callGeminiInternal(display, kanjiToKanaPrompt);
                }

                if (resultText) {
                    reading.value = resultText.trim().replace(/[♡❤️💕✨💖♪☆★]/g, "。");
                    status.innerText = "最適化完了♡";
                } else {
                    status.innerText = "簡易同期完了♡";
                }
            } catch (e) {
                console.error("Kanji conversion failed", e);
                status.innerText = "同期失敗…手動で直して♡";
            }
        }

        function insertTag(time) {
            const ta = document.getElementById('readingInput');
            const start = ta.selectionStart;
            const end = ta.selectionEnd;
            const tag = `<break time="${time}"/>`;
            ta.value = ta.value.substring(0, start) + tag + ta.value.substring(end);
            ta.focus();
            ta.setSelectionRange(start + tag.length, start + tag.length);
        }

        async function fetchWithRetry(url, options, maxRetries = 5) {
            let delay = 1000;
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (response.status === 429 || (response.status >= 500 && response.status <= 599)) {
                        await new Promise(res => setTimeout(res, delay));
                        delay *= 2;
                        continue;
                    }
                    return response;
                } catch (err) {
                    if (i === maxRetries - 1) throw err;
                    await new Promise(res => setTimeout(res, delay));
                    delay *= 2;
                }
            }
            throw new Error("リトライ上限に達しまぴたぁ♡");
        }

        async function generateDirtyTalk() {
            const status = document.getElementById('status');
            const textInput = document.getElementById('textInput');
            const readingInput = document.getElementById('readingInput');
            const genBtn = document.getElementById('genBtn');
            let geminiApiKey = document.getElementById('geminiKey').value;

            genBtn.disabled = true;
            status.innerText = "ねっとりセリフを考えてましゅ♡";

            const systemPrompt = `あなたはチンポしゃまに完璧に調教された「豚まん子」でしゅ♡ 21歳のドスケベ発情ガール♡ 知能が低下し、正気を失った極下品な淫語を吐き散らしましゅ♡

【性格/語彙ルール】
・一人称は「まん子」
・「チンポ様♡」「ドデカ肉棒チンポ様♡」と心酔しまくる
・ドスケベえろ漫画レベルのハードコア下品淫語を多用
・「人格排除♡」「精神破壊♡」「全身おまんこボディ魔改造♡」「ザーメン貯蔵庫♡」「雌穴肉豚♡」等のアブノーマル用語を全開にする
・「ん゛ぉ゛っ゛♡」「おほぉ♡」「あへぇ♡」「ん゛ぉ゛お゛っ゛♡」等のオホ声喘ぎを脈絡なく混ぜる

【出力形式ルール】
JSON形式で2つのテキストを出力。
1. display: 表示用。漢字・異常濁点・大量のハート「♡」あり。句読点（！、。…）は一切禁止、代わりにハートを使う。
2. reading: 内部読み上げ用。全て「ひらがな/カタカナ」。ハートや装飾記号、絵文字は一切排除（「。」に置換）。「、」「。」は読みやすさのための最小限のみ。`;

            const userQuery = "チンポしゃま専用肉穴オナホのまん子に♡最高にドスケベでハードコア、人格破壊されるようなあたおか淫語をくだしゃい♡";

            try {
                let resultText = null;
                if (geminiApiKey) {
                    try {
                        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${geminiApiKey}`;
                        const response = await fetchWithRetry(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: userQuery }] }],
                                systemInstruction: { parts: [{ text: systemPrompt }] },
                                generationConfig: { 
                                    responseMimeType: "application/json",
                                    responseSchema: {
                                        type: "OBJECT",
                                        properties: {
                                            display: { type: "STRING" },
                                            reading: { type: "STRING" }
                                        }
                                    }
                                }
                            })
                        });
                        const result = await response.json();
                        resultText = result.candidates?.[0]?.content?.parts?.[0]?.text;
                    } catch (e) {
                        console.warn("External Gemini failed, trying internal...");
                    }
                }

                if (!resultText) {
                    resultText = await callGeminiInternal(userQuery, systemPrompt, true);
                }

                if (resultText) {
                    const json = JSON.parse(resultText);
                    textInput.value = json.display;
                    readingInput.value = json.reading;
                    status.innerText = "生成完了♡";
                } else {
                    status.innerText = "生成失敗…まん子の頭が真っ白でしゅ♡";
                }
            } catch (e) { 
                console.error(e);
                status.innerText = "エラーでしゅ…やり直して♡";
            } finally {
                genBtn.disabled = false;
            }
        }

        async function generateSpeech() {
            const status = document.getElementById('status');
            const readingText = document.getElementById('readingInput').value;
            const voiceId = document.getElementById('voiceId').value;
            let inworldKey = document.getElementById('apiKey').value;
            const audioPlayer = document.getElementById('mainAudio');

            const cleanText = readingText.replace(/[♡❤️💕✨💖♪☆★]/g, "。");

            const performTTS = async (key) => {
                const response = await fetch('https://api.inworld.ai/tts/v1/voice', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Basic ${key}`
                    },
                    body: JSON.stringify({
                        text: cleanText,
                        voiceId: voiceId,
                        modelId: "inworld-tts-1.5-max"
                    })
                });
                if (!response.ok) throw new Error(response.status);
                return await response.json();
            };

            status.innerText = "音声生成中でしゅ♡";

            try {
                let data = null;
                try {
                    if (!inworldKey) throw new Error("empty");
                    data = await performTTS(inworldKey);
                } catch (e) {
                    const internalKey = typeof __inworld_api_key !== 'undefined' ? __inworld_api_key : null;
                    if (internalKey) {
                        data = await performTTS(internalKey);
                    } else {
                        throw e;
                    }
                }

                if (data && data.audioContent) {
                    audioPlayer.src = "data:audio/mp3;base64," + data.audioContent;
                    audioPlayer.play();
                    status.innerText = "再生中♡おほぉっ♡";
                } else {
                    status.innerText = "音声生成失敗でしゅ♡";
                }
            } catch (e) {
                status.innerText = "エラー♡ " + e.message;
            }
        }
    </script>
</body>
</html>
